<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مزايا للأجهزة والأثاثات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {font-family: Tahoma; margin:0; background:#f9f9f9; color:#333;}
    header {background:#2980b9; color:white; padding:15px; text-align:center;}
    h1 {margin:0; font-size:22px;}
    section {margin:20px;}
    h2 {color:#2980b9; border-bottom:2px solid #2980b9; padding-bottom:5px;}
    .products {display:flex; flex-wrap:wrap; gap:15px; justify-content:center;}
    .card {
      background:#fff; border:1px solid #ddd; border-radius:8px; width:220px; text-align:center; padding:10px;
      flex:1 1 200px;
    }
    .card img {width:100%; height:140px; object-fit:cover; border-radius:6px;}
    .card p {color:#27ae60; font-weight:bold;}
    .card button {
      background:#2980b9; color:white; border:none; padding:8px; margin-top:8px; cursor:pointer; border-radius:6px;
    }
    .card button:hover {background:#1f5f8a;}
    #cart {background:#fff; border:1px solid #ddd; margin:20px; padding:15px; border-radius:8px;}
    table {width:100%; border-collapse:collapse;}
    th, td {border:1px solid #ccc; padding:6px; text-align:center;}
    th {background:#2980b9; color:white;}
    #send-whatsapp {
      background:#25D366; color:white; border:none; padding:10px; width:100%; border-radius:6px; font-size:14px;
      cursor:pointer; margin-top:10px;
    }
    #send-whatsapp:hover {background:#128C7E;}
    #clear-cart {
      background:#e74c3c; color:white; border:none; padding:8px; width:100%; border-radius:6px; margin-top:8px;
      cursor:pointer;
    }
    #clear-cart:hover {background:#c0392b;}
  </style>
</head>
<body>

  <header>
    <h1>🛍️ مزايا للأجهزة والأثاثات</h1>
    <p>تسوق بسهولة وأرسل طلبك عبر واتساب</p>
  </header>

  <!-- أقسام المنتجات -->
  <section data-category="مكتبي">
    <h2>📂 أثاث مكتبي</h2>
    <div class="products"></div>
  </section>

  <section data-category="منزلي">
    <h2>🏠 أثاث منزلي</h2>
    <div class="products"></div>
  </section>

  <section data-category="كهربائي">
    <h2>⚡ أجهزة كهربائية</h2>
    <div class="products"></div>
  </section>

  <!-- السلة -->
  <div id="cart">
    <h2>🛒 سلة المشتريات</h2>
    <table>
      <thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th><th>إجراءات</th></tr></thead>
      <tbody id="cart-items"></tbody>
    </table>
    <p>المجموع الكلي: <span id="total">0</span> SDG</p>
    <input type="text" id="customer-name" placeholder="👤 اسم العميل">
    <button id="send-whatsapp" onclick="sendToWhatsApp()">📲 إرسال عبر واتساب</button>
    <button id="clear-cart" onclick="clearCart()">🧹 تفريغ السلة</button>
  </div>

  <script>
    let cart = [];

    function addToCart(product, price){
      let item = cart.find(i=>i.product===product);
      if(item){ item.quantity++; }
      else { cart.push({product,price:Number(price),quantity:1}); }
      updateCart();
    }

    function updateCart(){
      const cartItems=document.getElementById('cart-items');
      cartItems.innerHTML='';
      let total=0;
      cart.forEach((item,index)=>{
        total+=item.price*item.quantity;
        cartItems.innerHTML+=`
          <tr>
            <td>${item.product}</td>
            <td>${item.price.toLocaleString()} SDG</td>
            <td>${item.quantity}</td>
            <td>${(item.price*item.quantity).toLocaleString()} SDG</td>
            <td>
              <button onclick="increaseQuantity(${index})">+</button>
              <button onclick="decreaseQuantity(${index})">-</button>
              <button onclick="removeItem(${index})">🗑</button>
            </td>
          </tr>`;
      });
      document.getElementById('total').textContent=total.toLocaleString();
    }

    function increaseQuantity(i){ cart[i].quantity++; updateCart(); }
    function decreaseQuantity(i){ if(cart[i].quantity>1){cart[i].quantity--;} else {cart.splice(i,1);} updateCart(); }
    function removeItem(i){ cart.splice(i,1); updateCart(); }
    function clearCart(){ cart=[]; updateCart(); }

    function sendToWhatsApp(){
      if(cart.length===0){ alert("⚠️ السلة فارغة!"); return; }
      const name = document.getElementById('customer-name').value.trim();
      let total = 0;
      let message = "✨🛍️ طلبية جديدة من متجر مزايا ✨\n";
      if(name){ message += "👤 العميل: " + name + "\n"; }
      message += "📦 المنتجات:\n-----------------------------\n";
      cart.forEach(item=>{
        total += item.price * item.quantity;
        message += `- ${item.product} | ${item.price} SDG × ${item.quantity} = ${(item.price*item.quantity)} SDG\n`;
      });
      message += "-----------------------------\n";
      message += "💰 المجموع الكلي: " + total + " SDG\n";
      message += "📲 شكراً لتسوقك معنا!";

      const phone = "249915095779"; // ضع رقم المتجر هنا
      const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
      alert("✅ تم إرسال طلبك عبر واتساب، سنتواصل معك قريبًا!");
    }

    // تحميل المنتجات من Google Sheets CSV
    async function loadProducts(){
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRaCBaVpZfH5i4eAIsTKCMxtBECuAhXUTH1PTU4X6RQkTT0Gy4JV3R2IdTQd1-iq5yh7tLo8eLIOfog/pub?output=csv";
      const response = await fetch(url);
      const text = await response.text();
      const rows = text.split("\n").map(r => r.split(","));
      const headers = rows[0];
      const data = rows.slice(1);

      data.forEach(row => {
        if(row.length < headers.length) return; // تجاهل الصفوف الفارغة
        const product = {};
        headers.forEach((h,i)=> product[h.trim()] = row[i]);
        renderProduct(product);
      });
    }

    function renderProduct(p){
      const section = document.querySelector(`section[data-category="${p.category}"] .products`);
      if(section){
        section.innerHTML += `
          <div class="card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>${parseInt(p.price).toLocaleString()} SDG</p>
            <button onclick="addToCart('${p.name}',${p.price})">أضف للسلة</button>
          </div>`;
      }
    }

    loadProducts();
  </script>
</body>
</html>
